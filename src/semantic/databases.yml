# Database Catalog
# Lists all available MongoDB databases and their collections

databases:
  - name: ClientDB
    description: Business tenant configuration, subscription plans, and client management data
    collections:
      - Business
      - Plan

  - name: AnalyticsDB
    description: User activity, notifications, alerts, engagement tracking, and configuration data
    collections:
      - UserActivity
      - AlertActions
      - TrackNotifications
      - NotificationRead
      - Branding
      - SmartNotificationFeedback
      - WhatsAppMessageTracking
      - Translation
      - ChartType

  - name: AccountDB
    description: User accounts, roles, sessions, and communication channel subscriptions
    collections:
      - Account
      - AccountType
      - AccountRole
      - AccountSessionInfo
      - Channel
      - ChannelAccount

  - name: AlertDB
    description: Emergency alerts, alert types, state transition records, and GPS location trails
    collections:
      - Alert
      - AlertType
      - AlertRecord
      - AlertLocation

  - name: NotificationDB
    description: Push notification records and per-user read/archive status
    collections:
      - Notification
      - NotificationAccountArchive

  - name: EventDB
    description: Bookable events and appointments with attendee tracking
    collections:
      - EventV2

  - name: DocumentDB
    description: Digital wallets, vouchers, and wallet transaction history
    collections:
      - Wallet
      - WalletHistory
      - WalletType
