entities:
  - name: Business
    grain: one row per business/tenant
    description: >-
      Business (tenant) configuration including name, subdomain, plan assignment, category, and soft-delete status. Each business references a Plan via planId.
    fields: ['_id', 'name', 'subdomain', 'clientId', 'planId', 'category', 'uniqueAuthCode', 'isDeleted', 'version']
    join_hint: "To join Business with Plan use $lookup: { from: 'Plan', localField: 'planId', foreignField: '_id', as: 'plan' }. Both planId and Plan._id are ObjectId — never compare them as strings."
    example_questions:
      - How many active businesses are there?
      - Which businesses use each plan?
      - How many businesses per category?
      - List all deleted businesses
      - Show businesses by plan tier
    use_cases: >-
      Tenant management reporting
      Plan adoption analysis
      Business segmentation by category

  - name: Plan
    grain: one row per subscription plan
    description: >-
      Subscription plan definitions with pricing, tier level, and free/paid status. Referenced by Business.planId.
    fields: ['_id', 'code', 'name', 'price', 'entitlements', 'createdAt', 'updatedAt', 'isFree', 'tierLevel']
    example_questions:
      - How many plans are free vs paid?
      - What is the tier level of each plan?
      - Which plan has the most businesses assigned?
      - List all plans ordered by tier level
    use_cases: >-
      Subscription plan catalog
      Pricing and tier analysis
      Entitlement management

  - name: UserActivity
    grain: one row per user session/activity event
    description: >-
      User session and activity tracking data for analyzing user engagement patterns, device usage, and account activity.
    fields: ['_id', 'date', 'accountId', 'accountTypeId', 'os', 'device', 'businessId']
    example_questions:
      - How many active users per day?
      - What devices are most used?
      - Which account types have the most activity?
      - Show activity by operating system
      - What is the trend of user activity over time?
    use_cases: >-
      User engagement analysis
      Device and platform analytics
      Account type segmentation

  - name: AlertActions
    grain: one row per alert interaction event
    description: >-
      Alert interaction events tracking how users respond to alerts across different devices and platforms.
    fields: ['_id', 'accountId', 'alertId', 'date', 'deviceClientType', 'deviceClientModel', 'deviceClientOS', 'businessId']
    example_questions:
      - How many alert interactions per day?
      - Which alerts are most interacted with?
      - What devices are used for alert interactions?
      - Show alert engagement by operating system
    use_cases: >-
      Alert engagement monitoring
      Device-specific alert optimization
      User response tracking

  - name: TrackNotifications
    grain: one row per notification delivery tracking event
    description: >-
      Notification delivery tracking data for analyzing notification reach, delivery success, and session-based targeting.
    fields: ['_id', 'date', 'notificationId', 'businessId', 'accountId', 'deviceClientType', 'deviceClientModel', 'deviceClientOS', 'sessionId']
    example_questions:
      - How many notifications were sent per day?
      - What is the delivery distribution by device type?
      - Which sessions receive the most notifications?
      - Show notification volume by business
    use_cases: >-
      Notification delivery analytics
      Device targeting optimization
      Business notification reporting

  - name: NotificationRead
    grain: one row per notification read event
    description: >-
      Notification read events for tracking engagement and measuring notification effectiveness.
    fields: ['_id', 'date', 'notificationId', 'accountId', 'deviceClientType', 'deviceClientModel', 'deviceClientOS', 'businessId', 'sessionId', 'phone']
    example_questions:
      - What is the notification read rate?
      - Which devices have the highest read rates?
      - What time of day are notifications most read?
      - Compare read rates by operating system
    use_cases: >-
      Read rate optimization
      Engagement analytics
      Best timing analysis

  - name: Branding
    grain: one row per branding interaction event
    description: >-
      Branding interaction events for tracking brand exposure, engagement, and reach across devices.
    fields: ['_id', 'date', 'brandingId', 'accountId', 'deviceClientType', 'deviceClientModel', 'deviceClientOS', 'type', 'businessId']
    example_questions:
      - How many branding interactions per day?
      - Which branding types are most viewed?
      - What is the device distribution of branding views?
      - Show branding engagement by type
    use_cases: >-
      Brand exposure tracking
      Marketing analytics
      Device-specific engagement

  - name: SmartNotificationFeedback
    grain: one row per AI notification feedback
    description: >-
      Feedback on AI-generated notifications for measuring AI quality, model performance, and user satisfaction.
    fields: ['_id', 'prompt', 'notification', 'feedback', 'modelUsed', 'iaUsed', 'businessId', 'date']
    example_questions:
      - What is the feedback distribution?
      - Which AI models perform best?
      - What types of prompts generate the best feedback?
      - Compare feedback by AI system
    use_cases: >-
      AI model evaluation
      Notification quality improvement
      Prompt engineering insights

  - name: WhatsAppMessageTracking
    grain: one row per WhatsApp message tracking record
    description: >-
      WhatsApp message delivery tracking for monitoring message status and delivery success.
    fields: ['_id', 'notificationId', 'messageId', 'accountId', 'businessId', 'creationDate', 'statusUpdates']
    example_questions:
      - What is the WhatsApp message delivery success rate?
      - How many messages per business?
      - Show message status distribution
    use_cases: >-
      WhatsApp delivery monitoring
      Business messaging analytics
      Status tracking

  - name: Translation
    grain: one row per translation entry
    description: >-
      i18n translations for multi-language support including Spanish and Catalan.
    fields: ['_id', 'tag', 'default', 'es', 'ca']
    example_questions:
      - How many translations exist?
      - Which tags have translations?
      - What is the coverage of Spanish translations?
    use_cases: >-
      Localization management
      Translation coverage reporting

  - name: ChartType
    grain: one row per chart type configuration
    description: >-
      Chart configuration metadata for analytics visualization options.
    fields: ['_id', 'name', 'tag']
    example_questions:
      - What chart types are available?
      - How many chart configurations exist?
    use_cases: >-
      Visualization configuration
      Chart type management

  - name: Account
    grain: one row per user account
    description: >-
      User account registrations including type, role, phone, validation status, blocked status, and business association.
    fields: ['_id', 'accountType', 'username', 'phone', 'role', 'creationDate', 'subscribed', 'validated', 'blocked', 'blockedDate', 'businessId']
    example_questions:
      - How many accounts were created this month?
      - How many accounts are blocked vs active?
      - How many validated accounts per business?
      - What is the account growth trend over time?
    use_cases: >-
      User registration analytics
      Account health monitoring
      Growth tracking by business

  - name: AccountType
    grain: one row per account type
    description: >-
      Definitions of user/role types on the platform with ordering index and soft-delete.
    fields: ['_id', 'name', 'index', 'businessId', 'deleted']
    example_questions:
      - What account types exist?
      - How many accounts per account type?
      - Which account types are active?
    use_cases: >-
      Account segmentation
      Role type catalog

  - name: AccountRole
    grain: one row per permission role
    description: >-
      Permission roles defining access levels for accounts, scoped to one or more businesses.
    fields: ['_id', 'name', 'accessLevel', 'deleted', 'businessIds']
    example_questions:
      - What roles are defined?
      - Which roles have the highest access level?
    use_cases: >-
      Permission role catalog
      Access level analysis

  - name: AccountSessionInfo
    grain: one row per active user session
    description: >-
      Active session records per account capturing platform, device, OS, and language for DAU and platform breakdown.
    fields: ['_id', 'accountId', 'clientPlatform', 'language', 'platform', 'deviceClientModel', 'deviceClientOS', 'deviceClientType', 'creationDate', 'lastUpdated', 'businessId']
    example_questions:
      - How many daily active users (DAU)?
      - What platforms do users use?
      - What is the device distribution across sessions?
      - Which languages are most common?
    use_cases: >-
      DAU tracking
      Platform and device analytics
      Language distribution

  - name: Channel
    grain: one row per communication channel
    description: >-
      Communication channels or topics used for grouping notifications and account subscriptions.
    fields: ['_id', 'name', 'topic', 'status', 'deleted', 'businessId']
    example_questions:
      - How many channels exist per business?
      - Which channels are active?
    use_cases: >-
      Channel catalog management
      Subscription segmentation

  - name: ChannelAccount
    grain: one row per account-channel subscription
    description: >-
      User subscriptions to channels — tracks which accounts subscribe to which channels and when.
    fields: ['_id', 'accountId', 'channelId', 'subscribed', 'deleted', 'createdAt', 'businessId']
    example_questions:
      - How many subscribers does each channel have?
      - What is the subscription trend over time?
    use_cases: >-
      Channel subscription analytics
      Audience sizing per channel

  - name: Alert
    grain: one row per emergency alert
    description: >-
      Core emergency alert records including creator, type, state, status, region, and time open for resolution analytics.
    fields: ['_id', 'creationDate', 'modificationDate', 'userId', 'userType', 'state', 'alertType', 'status', 'businessId', 'region', 'timeOpen']
    example_questions:
      - How many alerts were created this month?
      - What is the average alert resolution time by type?
      - How many alerts are open vs closed?
      - Show alert volume by region
    use_cases: >-
      Emergency alert monitoring
      Resolution time analysis
      Regional distribution

  - name: AlertType
    grain: one row per alert category
    description: >-
      Alert category definitions with display color and soft-delete, scoped per business.
    fields: ['_id', 'name', 'color', 'deleted', 'businessId']
    example_questions:
      - What alert types are configured?
      - How many alerts per alert type?
    use_cases: >-
      Alert type catalog
      Alert segmentation by category

  - name: AlertRecord
    grain: one row per alert state transition
    description: >-
      State transition log for alerts capturing each step in the alert workflow for funnel and process analysis.
    fields: ['_id', 'account', 'alert', 'date', 'lastState', 'nextState', 'businessId']
    example_questions:
      - How many state transitions happen per alert on average?
      - What is the most common state transition path?
      - How long do alerts spend in each state?
    use_cases: >-
      Alert workflow funnel analysis
      State transition reporting

  - name: AlertLocation
    grain: one row per GPS location point for an alert
    description: >-
      GPS trail of location points captured during an alert for geographic analysis.
    fields: ['_id', 'alert', 'latitude', 'longitude', 'creationDate', 'businessId']
    example_questions:
      - How many location points are recorded per alert?
      - What is the geographic distribution of alerts?
    use_cases: >-
      Alert geographic analysis
      Response routing

  - name: Notification
    grain: one row per push notification
    description: >-
      Push notification records with type, channel, topic, pinned status, and soft-delete.
    fields: ['_id', 'title', 'body', 'type', 'creationDate', 'topic', 'channel', 'businessId', 'deleted', 'isPinned']
    example_questions:
      - How many notifications were sent this month?
      - What is the breakdown of notifications by type?
      - Which channels have the most notifications?
    use_cases: >-
      Notification volume reporting
      Channel and type distribution

  - name: NotificationAccountArchive
    grain: one row per account-notification read/archive record
    description: >-
      Per-user read and archive status for notifications — use to compute read rates and engagement per account type.
    fields: ['_id', 'accountId', 'notificationId', 'updatedAt', 'deleted', 'businessId']
    example_questions:
      - What is the notification read rate per account type?
      - How many notifications has each account archived?
      - Show notification read rate trends over time
    use_cases: >-
      Notification read rate analytics
      Per-user engagement tracking

  - name: EventV2
    grain: one row per bookable event or appointment
    description: >-
      Current-generation bookable events/appointments with embedded attendees, pricing, sharing mode, and recurrence. The older Event collection is deprecated — use EventV2.
    fields: ['_id', 'startDate', 'endDate', 'status', 'sharingMode', 'businessId', 'limitAttendees', 'attendees', 'owners', 'location', 'isAnswerAllowed', 'maxDateAnswer', 'isRecursive', 'price', 'isPaymentNeeded', 'tags', 'createdAt', 'updatedAt']
    example_questions:
      - How many events were created this month?
      - What is the distribution of events by status?
      - How many events require payment?
      - What is the average event price?
    use_cases: >-
      Event volume and status reporting
      Paid vs free event analysis
      Scheduling analytics

  - name: Wallet
    grain: one row per digital wallet or voucher
    description: >-
      Digital wallets and vouchers with type, expiration date, usage limits, and soft-delete.
    fields: ['_id', 'walletNumber', 'walletTypeId', 'expirationDate', 'limitUsages', 'businessId', 'deleted']
    example_questions:
      - How many wallets are active vs expired?
      - What is the distribution of wallets by type?
      - How many wallets have a usage limit?
    use_cases: >-
      Wallet inventory reporting
      Voucher type distribution
